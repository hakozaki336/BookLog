services:
  mysql:
    image: mysql:8.4
    container_name: booklog-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-booklog}
      MYSQL_USER: ${MYSQL_USER:-booklog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-booklog_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: booklog-php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      # .env が database のままでも sessions テーブルが無いとセッションが壊れ CSRF mismatch になるため
      SESSION_DRIVER: cookie
      SESSION_SAME_SITE: lax
      SESSION_SECURE_COOKIE: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-booklog}
      DB_USERNAME: ${MYSQL_USER:-booklog}
      DB_PASSWORD: ${MYSQL_PASSWORD:-booklog_secret}
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: booklog-nginx
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/laravel.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  frontend:
    image: node:22-alpine
    container_name: booklog-frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}
    # npm ci は package-lock に厳密に従う（ボリューム内の古い node_modules を確実に更新しやすい）
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  mysql_data:
  frontend_node_modules:
